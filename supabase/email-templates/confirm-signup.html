<!--
  Supabase → Authentication → Email Templates → "Confirm signup"
  Corpo (Body) em HTML.
  Assunto sugerido: Confirma o teu email — StarCraft — A Gênese
-->
<table role="presentation" cellpadding="0" cellspacing="0" width="100%" style="background-color:#0a0a0a;margin:0;padding:24px 12px;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;">
  <tr>
    <td align="center">
      <table role="presentation" cellpadding="0" cellspacing="0" width="100%" style="max-width:520px;background-color:#111112;border:1px solid #c9a84c;border-radius:8px;overflow:hidden;">
        <tr>
          <td style="padding:28px 24px 8px;text-align:center;border-bottom:1px solid rgba(201,168,76,0.25);">
            <p style="margin:0;font-family:Georgia,'Palatino Linotype',Palatino,serif;font-size:13px;letter-spacing:0.28em;text-transform:uppercase;color:#c9a84c;">StarCraft</p>
            <p style="margin:8px 0 0;font-family:Georgia,'Palatino Linotype',Palatino,serif;font-size:11px;letter-spacing:0.18em;color:rgba(232,228,217,0.55);">A Gênese</p>
          </td>
        </tr>
        <tr>
          <td style="padding:28px 24px;">
            <h1 style="margin:0 0 12px;font-family:Georgia,'Palatino Linotype',Palatino,serif;font-size:20px;font-weight:600;letter-spacing:0.12em;color:#c9a84c;text-align:center;">Confirma o teu email</h1>
            <p style="margin:0 0 20px;font-size:15px;line-height:1.55;color:#e8e4d9;text-align:center;">Obrigado por te registares. Clica no botão abaixo para ativares a tua conta e acederes ao site.</p>
            <table role="presentation" cellpadding="0" cellspacing="0" width="100%">
              <tr>
                <td align="center" style="padding:8px 0 24px;">
                  <a href="{{ .ConfirmationURL }}" style="display:inline-block;padding:14px 28px;background-color:#4a4428;color:#0a0a0a;font-size:12px;font-weight:700;letter-spacing:0.2em;text-decoration:none;text-transform:uppercase;border-radius:4px;border:1px solid #c9a84c;">Confirmar conta</a>
                </td>
              </tr>
            </table>
            <p style="margin:0;font-size:12px;line-height:1.5;color:rgba(232,228,217,0.45);text-align:center;">Se o botão não funcionar, usa este link:</p>
            <p style="margin:12px 0 0;font-size:11px;line-height:1.45;color:rgba(201,168,76,0.75);word-break:break-all;text-align:center;">{{ .ConfirmationURL }}</p>
          </td>
        </tr>
        <tr>
          <td style="padding:16px 24px;background-color:#0a0a0a;border-top:1px solid rgba(255,255,255,0.06);">
            <p style="margin:0;font-size:11px;line-height:1.5;color:rgba(232,228,217,0.35);text-align:center;">StarCraft — A Gênese</p>
          </td>
        </tr>
      </table>
    </td>
  </tr>
</table>
